name: CI

"on":
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  java:
    name: Build host and legacy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v4
      - name: Gradle build
        run: ./gradlew :host:shadowJar :host-legacy:build --no-daemon
      - name: E2E (real Paper)
        run: bash e2e/run.sh host/build/libs/paperscript-host-*.jar
        timeout-minutes: 8
      - name: Upload host jar
        uses: actions/upload-artifact@v4
        with:
          name: paperscript-host
          path: host/build/libs/paperscript-host-*.jar

  legacy-e2e:
    name: E2E legacy (Paper 1.12.2, Nashorn)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v4
      - name: Build legacy host
        run: ./gradlew :host-legacy:build --no-daemon
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "8"
      - name: E2E (real Paper 1.12.2)
        run: PAPER_VERSION=1.12.2 PS_PLUGIN_DIR=PaperScriptLegacy bash e2e/run.sh host-legacy/build/libs/paperscript-legacy-*.jar
        timeout-minutes: 8

  js:
    name: Build SDK and examples
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Build SDK
        working-directory: sdk
        run: npm ci && npm run build
      - name: Build example hello
        working-directory: examples/hello
        run: npm ci && npm run build
      - name: Build example essentials
        working-directory: examples/essentials
        run: npm ci && npm run build
