name: PaperScriptLegacy
version: '0.2.0'
main: dev.paperscript.legacy.PaperScriptLegacyPlugin
load: POSTWORLD
authors: [PaperScript]
description: PaperScript for legacy servers (1.12.2-1.16.5) — Nashorn JS engine, same ps.* facade.
commands:
  ps:
    description: PaperScript management
    usage: /ps <list|reload|info>
    permission: paperscript.admin
permissions:
  paperscript.admin:
    description: Manage PaperScript scripts
    default: op
